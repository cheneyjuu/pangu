# 关联业务：盘古后端运行配置，包含维修附件预览与电子印章服务商选择。
server:
  port: 8080
  servlet:
    context-path: /pangu

spring:
  application:
    name: pangu-backend
  config:
    import:
      - optional:file:.env.local[.properties]
      - optional:file:../.env.local[.properties]
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB
  profiles:
    active: dev

  # Postgres 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/pangu_db?useSSL=false&characterEncoding=utf8
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  # Flyway 数据库版本迁移配置
  flyway:
    enabled: true
    clean-disabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

  # Redis 缓存配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      # 留空表示无密码；自定义 RedissonConfig 会跳过 AUTH 命令
      password:
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis 配置
mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.pangu.infrastructure.persistence.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 平台业务与安全策略参数
platform:
  attestation:
    # outbox-pending 仅用于开发/测试：落 outbox 并返回 STUB-*，不具备司法链法律效力。
    provider: outbox-pending
  committee-key-revocation:
    # mock 仅用于开发/测试：不真实吊销证书或密钥。
    provider: mock
  electronic-seal:
    # mock 仅在 dev/test profile 注册；生产环境必须配置真实服务商适配器。
    provider: ${PANGU_ELECTRONIC_SEAL_PROVIDER:mock}
  enterprise-verification:
    # mock-aliyun 仅在 dev/test profile 注册；模拟结论会显式标记且不得用于生产签约。
    provider: ${PANGU_ENTERPRISE_VERIFICATION_PROVIDER:mock-aliyun}
  security:
    # JWT 秘钥（SM2 或 HMAC-SHA256 秘钥占位，开发环境使用默认，生产通过环境变量替换）
    jwt-secret: pangu-secure-jwt-token-secret-key-32-chars-minimum
    jwt-expiration-seconds: 7200
    # 刷新凭证只保存 SHA-256 摘要，轮换后旧凭证立即失效；14 天内保持已登录状态。
    refresh-token-expiration-seconds: 1209600
    # 国密 SM4 16字节(128位) 对称加解密密钥十六进制字符串
    sm4-key-hex: 0123456789abcdeffedcba9876543210
  ali-oss:
    endpoint: ${PANGU_OSS_ENDPOINT:https://oss-cn-shanghai.aliyuncs.com}
    region: ${PANGU_OSS_REGION:cn-shanghai}
    bucket-name: ${PANGU_OSS_BUCKET_NAME:pangu20260711}
    public-bucket-name: ${PANGU_OSS_PUBLIC_BUCKET_NAME:pangu-residents-public}
    access-key-id: ${PANGU_OSS_ACCESS_KEY_ID:DUMMY_KEY_ID_FOR_DEV}
    access-key-secret: ${PANGU_OSS_ACCESS_KEY_SECRET:DUMMY_KEY_SECRET_FOR_DEV}
  document-preview:
    excel:
      soffice-command: ${PANGU_LIBREOFFICE_COMMAND:soffice}
      timeout-seconds: ${PANGU_EXCEL_PREVIEW_TIMEOUT_SECONDS:45}
      cjk-font-family: ${PANGU_EXCEL_PREVIEW_CJK_FONT:Noto Sans CJK SC}
  identity:
    # 微信小程序原生手机号授权；生产环境必须通过环境变量提供真实主体凭据。
    wechat-mini-program:
      app-id: ${PANGU_WECHAT_MINI_PROGRAM_APP_ID:}
      app-secret: ${PANGU_WECHAT_MINI_PROGRAM_APP_SECRET:}
      request-timeout-millis: ${PANGU_WECHAT_MINI_PROGRAM_REQUEST_TIMEOUT_MILLIS:5000}
    tencent:
      region: ap-guangzhou
      secret-id:
      secret-key:
      timeout-millis: 3000
    id-card-ocr:
      provider-mode: mock              # mock=本地测试识别；tencent=腾讯云身份证 OCR
    face-auth:
      provider-mode: mock              # mock=本地测试核身；tencent=腾讯云实名核身
      tencent:
        rule-id:
        min-similarity: 70
  voting:
    deadline-cron: "0 * * * * *"   # 每分钟整扫一次到期议题
    deadline-batch-size: 100
    reminder-outbox-cron: "15 * * * * *"  # 每分钟第 15 秒消费催票通知 outbox
    reminder-outbox-batch-size: 50
    reminder-delivery-mode: database       # database=展开逐户投递明细；mock=仅日志
    reminder-delivery-cron: "30 * * * * *" # 每分钟第 30 秒投递催票明细
    reminder-delivery-batch-size: 50
    sms-provider-mode: mock                # mock=本地回执；http=调用外部短信网关
    sms-provider:
      endpoint:
      bearer-token:
      timeout-millis: 3000
      # 可选：真实供应商模板编码；为空时沿用投递明细 messageTemplate。
      template-code:
      # 可选：按逗号配置回执 ID 字段，支持点路径，如 data.messageId。
      provider-message-id-fields:
      # 可选：按业务响应字段校验成功码，支持点路径；为空时只按 HTTP 2xx + 回执 ID 判断。
      success-code-field:
      success-code-values:
      # 可选：配置后发送 HMAC-SHA256(timestamp + "\n" + body) 签名。
      signature-secret:
      signature-header: X-Pangu-Signature
      signature-timestamp-header: X-Pangu-Timestamp
    monitor:
      # 无签名票数 / 成功写票总数超过该阈值时触发纸票/线下票占比告警。
      unsigned-ratio-threshold: "0.30"
      # 相邻写票间隔小于 30 秒的次数达到该阈值时触发快速连续投票告警。
      rapid-interval-threshold: 1
  handover:
    # HANDOVER_LOCK 下资金类敏感操作的大额阈值；>= 阈值熔断，< 阈值放行。
    large-amount-threshold: "10000.00"
