# ===================================================================
# application-prod.yml — 生产 profile 占位（M2-5.2 cleanup）
#
# 历史背景：M1 重构以前，DataScopeInterceptor 在上下文缺失时会回退到
# Mock 王小二上下文以便本地联调。生产环境若误用此回退即构成"反向漏洞"。
# M1 重构后已移除 mock 兜底（见 DataScopeInterceptor#intercept），
# 本文件仅作为 prod profile 的存在证据 + ProductionEmptyContextTest
# 的激活载体；继承 application.yml 的 datasource / redis 默认值。
#
# 注意：Spring Boot 不允许在 profile-specific 文件里设置 spring.profiles.active；
# 该字段必须留在主 application.yml 或通过 SPRING_PROFILES_ACTIVE 环境变量传入。
# 测试通过 @ActiveProfiles("prod") 激活本 profile。
#
# 生产部署时由真实部署文件 / 环境变量覆盖本文件，禁止把生产 secret
# 落到 src/test/resources。
# ===================================================================

# 本测试 profile 使用非 mock/stub 的占位 provider，并在测试类中用 @MockBean
# 提供不会触发外部调用的替身。这样可以验证 prod profile 下 DataScope 行为，
# 同时不绕过 ProductionSafetyGuard 对生产配置的 fail-fast 约束。
spring:
  flyway:
    enabled: true

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

platform:
  attestation:
    provider: high-court-test
  committee-key-revocation:
    provider: certificate-authority-test
  security:
    jwt-secret: pangu-prod-test-jwt-token-secret-key-32-chars-min
    sm4-key-hex: fedcba98765432100123456789abcdef
  ali-oss:
    access-key-id: TEST_NON_PROD_KEY_ID
    access-key-secret: TEST_NON_PROD_KEY_SECRET
  identity:
    tencent:
      secret-id: TEST_TENCENT_SECRET_ID
      secret-key: TEST_TENCENT_SECRET_KEY
      region: ap-guangzhou
    id-card-ocr:
      provider-mode: tencent
    face-auth:
      provider-mode: tencent
      tencent:
        rule-id: test-rule-id
    wechat-mini-program:
      app-id: wx-prod-context-test
      app-secret: TEST_WECHAT_MINI_PROGRAM_SECRET
  voting:
    sms-provider-mode: http
    sms-provider:
      endpoint: http://127.0.0.1:65535/test-sms-provider
